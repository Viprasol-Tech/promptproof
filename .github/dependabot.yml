version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
    labels: ["dependencies"]
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels: ["dependencies", "ci"]
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
